<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Easy-Pay | Recuperar Contraseña</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-primary {
            box-shadow: 0 0 20px rgba(13, 89, 242, 0.4);
        }
        .floating-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(13, 89, 242, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<!-- Floating Particles Background -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="floating-particle" style="top: 10%; left: 20%;"></div>
<div class="floating-particle" style="top: 30%; left: 80%;"></div>
<div class="floating-particle" style="top: 70%; left: 15%;"></div>
<div class="floating-particle" style="top: 85%; left: 60%;"></div>
<div class="floating-particle" style="top: 40%; left: 45%;"></div>
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full"></div>
</div>
<div class="relative z-10 flex flex-col min-h-screen w-full">
<!-- Top Bar -->
<header class="flex items-center justify-between p-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">confirmation_number</span>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Easy-Pay</span>
</div>
<button class="flex items-center justify-center size-10 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined">light_mode</span>
</button>
</header>
<!-- Main Content Container -->
<main class="flex-1 flex items-center justify-center px-6 pb-12">
<div class="w-full max-w-md">
<!-- Glassmorphic Card -->
<div class="glass-morphism rounded-xl p-8 shadow-2xl border border-white/10">
<!-- Hero Visual Area -->
<div class="flex flex-col items-center mb-8">
<div class="size-16 rounded-2xl bg-primary/20 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl">lock_reset</span>
</div>
<h1 class="text-2xl font-bold text-center text-slate-900 dark:text-white mb-3">
                            ¿Olvidaste tu contraseña?
                        </h1>
<p class="text-center text-slate-600 dark:text-slate-400 text-sm leading-relaxed max-w-[280px]">
                            Introduce tu email y te enviaremos las instrucciones para restablecerla.
                        </p>
</div>
<!-- Recovery Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">
                                Email
                            </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl">
                                    mail
                                </span>
<input class="w-full pl-12 pr-4 py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="email" placeholder="tu@email.com" type="email"/>
</div>
</div>
<button class="w-full py-4 px-6 rounded-lg bg-gradient-to-r from-primary to-blue-600 text-white font-bold text-base glow-primary hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Enviar instrucciones</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800 text-center">
<button class="inline-flex items-center gap-2 text-sm font-medium text-primary hover:underline">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                            Volver al inicio de sesión
                        </button>
</div>
</div>
<!-- Footer branding -->
<div class="mt-8 text-center">
<p class="text-xs text-slate-500 dark:text-slate-600 uppercase tracking-widest font-semibold">
                        Secure Payments by Easy-Pay
                    </p>
</div>
</div>
</main>

</div>
</div>
</body></html>
