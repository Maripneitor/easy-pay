<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Easy-Pay | Registrar Nuevo Gasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "slate-900": "#0f172a",
                        "slate-800": "#1e293b",
                        "blue-500": "#3b82f6",
                        "blue-600": "#2563eb",
                        "alice-blue": "#E3F2FD",
                        "icy-blue": "#BBDEFB",
                        "sky-blue": "#90CAF9",
                        "cool-sky": "#64B5F6",
                        "cool-sky-var": "#42A5F5",
                        "brilliant-blue": "#2196F3",
                        "twitter-azure": "#1E88E5",
                        "ocean-blue": "#1976D2",
                        "cobalt-deep": "#1565C0",
                        "royal-blue": "#0D47A1",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(59, 130, 246, 0.5)',
                        'card': '0 25px 50px -12px rgba(0, 0, 0, 0.5)'
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, transparent 50%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .input-dark {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-dark:focus {
            border-color: #2196F3;
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(to right, #2196F3, #1565C0);
            box-shadow: 0 4px 14px 0 rgba(33, 150, 243, 0.39);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 20px 0 rgba(33, 150, 243, 0.5);
            transform: translateY(-1px);
        }
        .floating-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }.checkbox-custom:checked {
            background-color: #2196F3;
            border-color: #2196F3;
        }
        .checkbox-custom {
            appearance: none;
            background-color: #1e293b;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.25em;
            height: 1.25em;
            border: 2px solid #334155;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: 0.2s all;
        }
        .checkbox-custom::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .checkbox-custom:checked::before {
            transform: scale(1);
        }.radio-custom:checked {
            border-color: #2196F3;
            background-color: #2196F3;
            box-shadow: inset 0 0 0 3px #1e293b;
        }
        .radio-custom {
            appearance: none;
            background-color: #1e293b;
            margin: 0;
            font: inherit;
            width: 1.25em;
            height: 1.25em;
            border: 2px solid #334155;
            border-radius: 50%;
            display: grid;
            place-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body class="font-display text-white min-h-screen relative overflow-x-hidden">
<div class="floating-circle bg-ocean-blue/20 w-96 h-96 top-0 left-0 -translate-x-1/2 -translate-y-1/2 fixed"></div>
<div class="floating-circle bg-cobalt-deep/20 w-[30rem] h-[30rem] bottom-0 right-0 translate-x-1/3 translate-y-1/3 fixed"></div>
<header class="relative z-20 px-6 py-5 flex items-center justify-between border-b border-white/5 bg-slate-900/50 backdrop-blur-md sticky top-0">
<button class="flex items-center text-slate-400 hover:text-white transition-colors text-sm font-medium">
<span class="material-symbols-outlined text-lg mr-1">arrow_back</span>
            Volver
        </button>
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
<span class="text-xs text-slate-400 font-semibold uppercase tracking-wider block">Grupo</span>
<span class="text-sm font-bold text-white">Cena viernes</span>
</div>
<div class="w-10"></div> 
</header>
<main class="relative z-10 w-full max-w-2xl mx-auto px-4 py-8 pb-32">
<h1 class="text-2xl font-bold mb-6 text-white flex items-center">
<span class="bg-cool-sky/20 p-2 rounded-lg mr-3">
<span class="material-symbols-outlined text-cool-sky">receipt_long</span>
</span>
            Registrar Nuevo Gasto
        </h1>
<form class="space-y-6">
<div class="glass-card rounded-2xl p-6">
<h2 class="text-lg font-semibold mb-4 text-slate-200">Datos del gasto</h2>
<div class="space-y-4">
<div>
<label class="block text-xs font-medium text-slate-400 mb-1.5" for="description">Descripción</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-lg">edit</span>
</div>
<input class="input-dark block w-full pl-10 pr-3 py-2.5 rounded-xl text-sm placeholder-slate-500" id="description" placeholder="Ej: Cena en taquería" type="text" value="Cena en taquería"/>
</div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div>
<label class="block text-xs font-medium text-slate-400 mb-1.5" for="amount">Monto Total</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-lg">attach_money</span>
</div>
<input class="input-dark block w-full pl-10 pr-3 py-2.5 rounded-xl text-lg font-bold text-white placeholder-slate-500" id="amount" placeholder="0.00" type="text" value="1,250.00"/>
</div>
</div>
<div>
<label class="block text-xs font-medium text-slate-400 mb-1.5" for="date">Fecha y Hora</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-lg">calendar_today</span>
</div>
<input class="input-dark block w-full pl-10 pr-3 py-2.5 rounded-xl text-sm placeholder-slate-500" id="date" type="datetime-local" value="2023-10-27T20:30"/>
</div>
</div>
</div>
</div>
</div>
<div class="glass-card rounded-2xl p-6">
<h2 class="text-lg font-semibold mb-4 text-slate-200">Tipo de división</h2>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
<label class="relative flex cursor-pointer rounded-xl border border-brilliant-blue bg-brilliant-blue/10 p-4 shadow-sm focus:outline-none">
<input aria-describedby="split-type-0-description-0 split-type-0-description-1" aria-labelledby="split-type-0-label" checked="" class="sr-only" name="split-type" type="radio" value="equally"/>
<span class="flex flex-1">
<span class="flex flex-col">
<span class="block text-sm font-medium text-white" id="split-type-0-label">Equitativa</span>
<span class="mt-1 flex items-center text-xs text-slate-300" id="split-type-0-description-0">Todos pagan lo mismo</span>
</span>
</span>
<span aria-hidden="true" class="material-symbols-outlined text-brilliant-blue check-circle ml-auto">check_circle</span>
</label>
<label class="relative flex cursor-pointer rounded-xl border border-slate-700 p-4 shadow-sm hover:border-slate-500 focus:outline-none bg-slate-800/50">
<input aria-describedby="split-type-1-description-0 split-type-1-description-1" aria-labelledby="split-type-1-label" class="sr-only" name="split-type" type="radio" value="percentage"/>
<span class="flex flex-1">
<span class="flex flex-col">
<span class="block text-sm font-medium text-slate-300" id="split-type-1-label">Porcentaje</span>
<span class="mt-1 flex items-center text-xs text-slate-500" id="split-type-1-description-0">Definir % por persona</span>
</span>
</span>
<span aria-hidden="true" class="material-symbols-outlined text-slate-600 ml-auto h-5 w-5">circle</span>
</label>
<label class="relative flex cursor-pointer rounded-xl border border-slate-700 p-4 shadow-sm hover:border-slate-500 focus:outline-none bg-slate-800/50">
<input aria-describedby="split-type-2-description-0 split-type-2-description-1" aria-labelledby="split-type-2-label" class="sr-only" name="split-type" type="radio" value="shares"/>
<span class="flex flex-1">
<span class="flex flex-col">
<span class="block text-sm font-medium text-slate-300" id="split-type-2-label">Partes</span>
<span class="mt-1 flex items-center text-xs text-slate-500" id="split-type-2-description-0">Por unidades consumidas</span>
</span>
</span>
<span aria-hidden="true" class="material-symbols-outlined text-slate-600 ml-auto h-5 w-5">circle</span>
</label>
</div>
</div>
<div class="glass-card rounded-2xl p-6">
<div class="flex justify-between items-center mb-4">
<h2 class="text-lg font-semibold text-slate-200">Participantes</h2>
<button class="text-xs text-brilliant-blue hover:text-blue-400 font-medium" type="button">Seleccionar todos</button>
</div>
<div class="space-y-3 mb-4">
<label class="flex items-center space-x-3 p-2 rounded-lg hover:bg-white/5 transition-colors cursor-pointer">
<input checked="" class="checkbox-custom" type="checkbox"/>
<div class="w-8 h-8 rounded-full bg-pink-500/20 text-pink-500 flex items-center justify-center text-xs font-bold border border-pink-500/30">AP</div>
<span class="text-sm font-medium text-slate-200 flex-1">Ana Pérez</span>
</label>
<label class="flex items-center space-x-3 p-2 rounded-lg hover:bg-white/5 transition-colors cursor-pointer">
<input checked="" class="checkbox-custom" type="checkbox"/>
<div class="w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-500 flex items-center justify-center text-xs font-bold border border-emerald-500/30">CL</div>
<span class="text-sm font-medium text-slate-200 flex-1">Carlos López</span>
</label>
<label class="flex items-center space-x-3 p-2 rounded-lg hover:bg-white/5 transition-colors cursor-pointer">
<input checked="" class="checkbox-custom" type="checkbox"/>
<div class="w-8 h-8 rounded-full bg-brilliant-blue/20 text-brilliant-blue flex items-center justify-center text-xs font-bold border border-brilliant-blue/30">TÚ</div>
<span class="text-sm font-medium text-slate-200 flex-1">Tú (Juan)</span>
</label>
<label class="flex items-center space-x-3 p-2 rounded-lg hover:bg-white/5 transition-colors cursor-pointer">
<input class="checkbox-custom" type="checkbox"/>
<div class="w-8 h-8 rounded-full bg-amber-500/20 text-amber-500 flex items-center justify-center text-xs font-bold border border-amber-500/30">LM</div>
<span class="text-sm font-medium text-slate-200 flex-1">Luis Martínez</span>
</label>
</div>
<div class="bg-slate-900/40 rounded-xl p-4 flex items-center justify-between border border-white/5">
<span class="text-sm text-slate-400">División preliminar:</span>
<span class="text-sm font-semibold text-sky-blue">Con 3 personas: $416.67 c/u</span>
</div>
</div>
<div class="glass-card rounded-2xl p-6">
<h2 class="text-lg font-semibold mb-4 text-slate-200">Propina (Opcional)</h2>
<div class="flex items-center mb-4 bg-slate-800/50 p-1 rounded-lg w-fit">
<button class="px-3 py-1.5 text-xs font-medium rounded-md bg-slate-600 text-white shadow-sm" type="button">Porcentaje</button>
<button class="px-3 py-1.5 text-xs font-medium rounded-md text-slate-400 hover:text-white" type="button">Monto fijo</button>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-lg">percent</span>
</div>
<input class="input-dark block w-full pl-10 pr-3 py-2.5 rounded-xl text-sm placeholder-slate-500" id="tip" placeholder="0" type="text" value="10"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="text-slate-400 text-sm font-medium">($125.00)</span>
</div>
</div>
</div>
</form>
</main>
<div class="fixed bottom-0 left-0 w-full bg-slate-900/80 backdrop-blur-xl border-t border-white/10 p-4 z-30">
<div class="max-w-2xl mx-auto flex flex-col items-center gap-3">
<button class="btn-primary w-full py-4 px-6 rounded-xl text-base font-bold text-white transition-all duration-200 shadow-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                GUARDAR GASTO
            </button>
<a class="text-sm text-slate-400 hover:text-white font-medium underline decoration-slate-600 underline-offset-4 hover:decoration-white transition-all" href="#">
                Guardar y agregar otro
            </a>
</div>
</div>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
<div class="absolute top-24 left-10 w-2 h-2 bg-sky-blue rounded-full opacity-50 animate-pulse"></div>
<div class="absolute top-40 right-20 w-1 h-1 bg-cool-sky rounded-full opacity-30"></div>
<div class="absolute bottom-60 left-1/4 w-1.5 h-1.5 bg-white rounded-full opacity-20"></div>
</div>

</body></html>
