<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Easy-Pay | Registrarse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "slate-900": "#0f172a",
                        "slate-800": "#1e293b",
                        "blue-500": "#3b82f6",
                        "blue-600": "#2563eb",
                        // New Palette Colors from annotation
                        "alice-blue": "#E3F2FD",
                        "icy-blue": "#BBDEFB",
                        "sky-blue": "#90CAF9",
                        "cool-sky": "#64B5F6",
                        "cool-sky-var": "#42A5F5",
                        "brilliant-blue": "#2196F3",
                        "twitter-azure": "#1E88E5",
                        "ocean-blue": "#1976D2",
                        "cobalt-deep": "#1565C0",
                        "royal-blue": "#0D47A1",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(59, 130, 246, 0.5)',
                        'card': '0 25px 50px -12px rgba(0, 0, 0, 0.5)'
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, transparent 50%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .input-dark {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-dark:focus {
            border-color: #2196F3;box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(to right, #2196F3, #1565C0);box-shadow: 0 4px 14px 0 rgba(33, 150, 243, 0.39);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 20px 0 rgba(33, 150, 243, 0.5);
            transform: translateY(-1px);
        }
        .floating-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
    </style>
</head>
<body class="font-display text-white min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="floating-circle bg-ocean-blue/20 w-96 h-96 top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
<div class="floating-circle bg-cobalt-deep/20 w-[30rem] h-[30rem] bottom-0 right-0 translate-x-1/3 translate-y-1/3"></div>
<main class="relative z-10 w-full max-w-md px-6">
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-cool-sky/10 rounded-2xl flex items-center justify-center mb-4 border border-cool-sky/20 shadow-glow">
<span class="material-symbols-outlined text-cool-sky text-4xl">confirmation_number</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white">Easy-Pay</h1>
<p class="text-slate-400 mt-2 text-sm">Sin matemáticas, sin dramas</p>
</div>
<div class="glass-card rounded-3xl p-8 w-full animate-fade-in-up">
<div class="flex space-x-2 bg-slate-800/50 p-1 rounded-xl mb-8">
<button class="flex-1 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-700/50 transition-all duration-200">
                Iniciar Sesión
            </button>
<button class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-slate-700 text-white shadow-sm transition-all duration-200">
                Registrarse
            </button>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-300" for="fullname">Nombre completo</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-xl">person</span>
</div>
<input class="input-dark block w-full pl-10 pr-3 py-3 rounded-xl sm:text-sm placeholder-slate-500" id="fullname" placeholder="Juan Pérez" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-300" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-xl">mail</span>
</div>
<input class="input-dark block w-full pl-10 pr-3 py-3 rounded-xl sm:text-sm placeholder-slate-500" id="email" placeholder="tu@ejemplo.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-300" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-xl">lock</span>
</div>
<input class="input-dark block w-full pl-10 pr-3 py-3 rounded-xl sm:text-sm placeholder-slate-500" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="btn-primary w-full py-3.5 px-4 border border-transparent rounded-xl text-sm font-bold text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brilliant-blue focus:ring-offset-slate-900" type="button">
                Crear Cuenta
            </button>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-700"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-2 bg-transparent text-slate-500 bg-[#162032]">O continúa con</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="w-full inline-flex justify-center py-2.5 px-4 border border-slate-700 rounded-xl shadow-sm bg-slate-800 text-sm font-medium text-slate-300 hover:bg-slate-700 transition-colors" type="button">
<svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path>
</svg>
</button>
<button class="w-full inline-flex justify-center py-2.5 px-4 border border-slate-700 rounded-xl shadow-sm bg-slate-800 text-sm font-medium text-slate-300 hover:bg-slate-700 transition-colors" type="button">
<svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"></path>
</svg>
</button>
</div>
</div>
</div>
<div class="mt-8 text-center">
<button class="inline-flex items-center justify-center px-6 py-2 border border-slate-600 rounded-full text-sm font-medium text-slate-300 hover:text-white hover:border-slate-400 hover:bg-white/5 transition-all duration-200">
            Continuar como Invitado
            <span class="material-symbols-outlined text-lg ml-1">arrow_forward</span>
</button>
</div>
</main>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden">
<div class="absolute top-10 left-10 w-2 h-2 bg-sky-blue rounded-full opacity-50 animate-pulse"></div>
<div class="absolute top-20 right-20 w-1 h-1 bg-cool-sky rounded-full opacity-30"></div>
<div class="absolute bottom-40 left-1/4 w-1.5 h-1.5 bg-white rounded-full opacity-20"></div>
</div>

</body></html>
