services:
  # --- DATABASE (Local MongoDB) ---
  mongodb:
    image: mongo:latest
    container_name: easy-pay-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # --- BACKEND (Python FastAPI) ---
  backend:
    build:
      context: ./apps/api-backend
      dockerfile: Dockerfile
      network: host
    container_name: easy-pay-backend
    volumes:
      - ./apps/api-backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
      - ./apps/api-backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mongodb

  # --- FRONTEND (Desactivado en Docker para evitar conflictos, usar localmente) ---
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   ... (omitido para limpieza)

  # --- MOBILE APP (Desactivado en Docker, usar npx expo run:ios localmente) ---
  # mobile:
  #   ... (omitido para limpieza)

volumes:
  mongo_data:
  node_modules:
  web_modules:
  mobile_modules:
  pnpm-store:
