services:
  # --- FRONTEND (Vite) ---
  dev-env:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: easy-pay-frontend
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - web_modules:/app/apps/web-app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    command: >
      sh -c "pnpm install && npm run dev:web"
    depends_on:
      - backend

  # --- BACKEND (Python FastAPI) ---
  backend:
    build:
      context: ./apps/api-backend
      dockerfile: Dockerfile
    container_name: easy-pay-backend
    volumes:
      - ./apps/api-backend:/app
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # --- MOBILE APP (Expo Go) ---
  mobile:
    build:
      context: .
      dockerfile: apps/mobile-app/Dockerfile
    container_name: easy-pay-mobile
    volumes:
      - .:/app
      - mobile_modules:/app/apps/mobile-app/node_modules
      - node_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${LOCAL_IP:-localhost}
      - EXPO_PACKAGER_PROXY_URL=http://${LOCAL_IP:-localhost}:8081
    stdin_open: true
    tty: true
    command: >
      sh -c "pnpm install && cd apps/mobile-app && npx expo start"

volumes:
  node_modules:
  web_modules:
  mobile_modules:
