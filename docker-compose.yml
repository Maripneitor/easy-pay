services:
  # --- DATABASE (Local MongoDB) ---
  mongodb:
    image: mongo:latest
    container_name: easy-pay-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # --- BACKEND (Python FastAPI) ---
  backend:
    build:
      context: ./apps/api-backend
      dockerfile: Dockerfile
      network: host
    container_name: easy-pay-backend
    volumes:
      - ./apps/api-backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
      - ./apps/api-backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mongodb

  # --- FRONTEND (React / Vite) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      network: host
    container_name: easy-pay-frontend
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - web_modules:/app/apps/web-app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    command: >
      sh -c "pnpm install --no-frozen-lockfile --node-linker=hoisted --config.package-import-method=copy && npm run dev:web"
    depends_on:
      - backend

  # --- MOBILE APP (Expo Go) ---
  mobile:
    build:
      context: .
      dockerfile: apps/mobile-app/Dockerfile
      network: host
    container_name: easy-pay-mobile
    volumes:
      - .:/app
      - mobile_modules:/app/apps/mobile-app/node_modules
      - node_modules:/app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - EXPO_PUBLIC_API_URL=http://backend:8000
      - REACT_NATIVE_PACKAGER_HOSTNAME=host.docker.internal
    stdin_open: true
    tty: true
    command: >
      sh -c "pnpm install --no-frozen-lockfile --node-linker=hoisted --config.package-import-method=copy && cd apps/mobile-app && npx expo start --host lan --clear"

volumes:
  mongo_data:
  node_modules:
  web_modules:
  mobile_modules:
  pnpm-store:
